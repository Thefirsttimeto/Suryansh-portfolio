<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sharanya.dev</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: "Courier New", monospace;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .cursor {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0; }
        }

        p {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 18px;
        }

        .btn {
            padding: 12px 24px;
            border: 2px solid #00ff00;
            color: #00ff00;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
            display: inline-block;
        }

        .btn:hover {
            background-color: #00ff00;
            color: #000;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Sharanya<span class="cursor">|</span></h1>
        <p>Student | Explorer</p>

        <a href="terminal.html" class="btn">Enter Terminal</a>
    </div>
</body>
</html>
